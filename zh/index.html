  <script>
    (function(){
      const SUPPORTED = ['zh','en'];
      const stored = localStorage.getItem('siteLang');
      const navLang = (navigator.language||navigator.userLanguage).toLowerCase();
      const browserLang = navLang.startsWith('en') ? 'en' : 'zh';
      // 初始化时先拿到用户偏好或浏览器语言，作按钮文字之用
      let initialLang = (stored && SUPPORTED.includes(stored)) ? stored : browserLang;

      const path = window.location.pathname;
      const hasPrefix = /^\/(zh|en)\//.test(path);
      if (!hasPrefix) {
        window.location.replace(`/${initialLang}${path}`);
        return;
      }

      const btn = document.getElementById('lang-btn');
      // 设置按钮文字
      if (path.startsWith('/zh/')) {
        btn.textContent = 'EN';
        btn.title = '切換到英文';
      } else {
        btn.textContent = '中';
        btn.title = 'Switch to Chinese';
      }

      btn.addEventListener('click', function(){
        // 每次点击都重新判断当前是哪一个，再切到对方
        const currentLang = path.startsWith('/zh/') ? 'zh' : 'en';
        const targetLang  = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('siteLang', targetLang);

        if (window.pageAlternateUrl) {
          // 文章页：用一对一映射
          window.location.pathname = window.pageAlternateUrl;
        } else {
          // 首页：兼容 /zh/ /zh/index.html
          const re = currentLang === 'zh'
            ? /^\/zh(\/|\/index\.html)?/
            : /^\/en(\/|\/index\.html)?/;
          // 替换成目标语言前缀
          window.location.pathname = path.replace(re, `/${targetLang}/`);
        }
      });
    })();
  </script>
